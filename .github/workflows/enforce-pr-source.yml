name: Enforce PR Source

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read

jobs:
  source-check:
    name: source-check
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        env:
          HEAD: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD" == "dev" ]] || [[ "$HEAD" =~ ^release/ ]] || [[ "$HEAD" =~ ^hotfix/ ]]; then
            echo "✓ PR source '$HEAD' is allowed for main"
            exit 0
          fi
          echo "::error::PR to main must come from 'dev', 'release/*', or 'hotfix/*'."
          echo "::error::Pattern: feature/* → dev → main. Source was: '$HEAD'"
          exit 1

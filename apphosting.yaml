runConfig:
  runtime: nodejs22
  concurrency: 10
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

env:
  - variable: NEXTAUTH_URL
    value: https://admin.triarch.dev
    availability:
      - BUILD
      - RUNTIME

  - variable: ADMIN_EMAIL
    value: mike@triarchsecurity.com
    availability:
      - RUNTIME

  - variable: DEPLOY_WEBHOOK_URL
    value: https://admin.triarch.dev/api/webhooks/github-deploy
    availability:
      - RUNTIME

  # Secrets — set via: firebase apphosting:secrets:set <KEY>
  - variable: DATABASE_URL
    secret: DATABASE_URL

  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET

  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID

  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET

  # Build-time GitHub Packages auth. .npmrc reads ${NODE_AUTH_TOKEN}; this
  # binds the existing GITHUB_PACKAGES_TOKEN secret under the name the
  # .npmrc expects, and exposes it during BUILD so `npm ci` can fetch
  # @myalterlego/* packages from npm.pkg.github.com.
  - variable: NODE_AUTH_TOKEN
    secret: GITHUB_PACKAGES_TOKEN
    availability:
      - BUILD

  - variable: DEPLOY_WEBHOOK_SECRET
    secret: DEPLOY_WEBHOOK_SECRET

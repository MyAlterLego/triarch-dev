name: build

# Reusable: builds the container, generates SBOM + SLSA provenance, signs with cosign,
# scans the image, pushes to GHCR. Returns the image ref + digest.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build"
        required: true
        type: string
    outputs:
      image:
        description: "Pushed image ref (registry/owner/repo:tag)"
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: "Image digest (sha256:...)"
        value: ${{ jobs.build.outputs.digest }}

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: build-sign-attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push to GHCR
      id-token: write       # OIDC for cosign keyless + SLSA provenance
      attestations: write   # publish attestation
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=long

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ----- SBOM (Syft) -----
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.7   # TODO: pin to commit SHA
        with:
          image: ${{ steps.meta.outputs.tags }}
          format: spdx-json
          output-file: sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      # ----- Image scan (Trivy) -----
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0   # TODO: pin to commit SHA
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

      # ----- Cosign keyless signing -----
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0   # TODO: pin to commit SHA

      - name: Sign image (keyless via OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ github.repository }}@${{ steps.push.outputs.digest }}"

      # ----- SLSA build provenance attestation -----
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

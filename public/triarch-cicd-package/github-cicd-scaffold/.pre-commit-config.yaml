## Local hooks that mirror the same checks CI runs.
## Install: pre-commit install -t pre-commit -t commit-msg -t pre-push

repos:
  # ---------- secrets ----------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2   # TODO: pin via SHA in your fork if your org policy requires
    hooks:
      - id: gitleaks
        args: ["protect", "--staged", "--redact"]

  # ---------- semgrep diff scan ----------
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.92.0
    hooks:
      - id: semgrep
        args:
          - "--config=p/ci"
          - "--config=p/owasp-top-ten"
          - "--config=p/react"
          - "--config=p/typescript"
          - "--error"
          - "--quiet"
          - "--diff"

  # ---------- IaC scans ----------
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.296
    hooks:
      - id: checkov
        args:
          - "--quiet"
          - "--soft-fail-on=LOW,MEDIUM"
          - "--directory=iac/"
        files: ^iac/.*\.(tf|tofu|yaml|yml)$

  - repo: https://github.com/aquasecurity/tfsec
    rev: v1.28.11
    hooks:
      - id: tfsec
        args: ["iac/"]
        files: ^iac/.*\.(tf|tofu)$

  # ---------- generic hygiene ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch=main"]

  # ---------- conventional commits ----------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # ---------- enforce signed commits (warn locally, CI hard-fails) ----------
  - repo: local
    hooks:
      - id: signed-commits
        name: signed-commits
        entry: bash -c 'git config --get commit.gpgsign | grep -q true || { echo "Set: git config --global commit.gpgsign true"; exit 1; }'
        language: system
        stages: [pre-commit]

  # ---------- threat-model drift (warns locally) ----------
  - repo: local
    hooks:
      - id: threat-model-drift
        name: threat-model-drift
        entry: bash -c 'arch=$(git diff --cached --name-only -- "src/" "iac/" "docs/architecture/" | wc -l); tm=$(git diff --cached --name-only -- ".threatmodel/" | wc -l); if [ $arch -gt 0 ] && [ $tm -eq 0 ]; then echo "::warning::architectural changes without .threatmodel/ updates — run /tm-threats"; fi'
        language: system
        stages: [pre-commit]
        pass_filenames: false
